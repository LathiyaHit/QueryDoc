
services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./services/api:/app
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file:
      - .env
    working_dir: /app/workers  
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    command: celery -A workers.main.celery_app worker --loglevel=info --queues=memory,analytics

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voiceai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d voiceai"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  redis_data:
  pg_data:
  qdrant_data:
