<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QueryDoc</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="app-shell">
    <div class="dashboard">
      <header class="topbar">
        <div class="brand">
          <span class="brand-dot"></span>
          <h1>QueryDoc</h1>
        </div>
        <div class="topbar-right">
          <button class="doc-badge" id="docBadge" title="Click to clear uploaded document">
            <span id="docBadgeIcon">📄</span>
            <span id="docBadgeText">Default document</span>
          </button>
          <div class="connection-pill" id="connectionPill">
            <span class="status-dot"></span>
            <span id="statusText">Ready</span>
          </div>
        </div>
      </header>

      <section class="chat-window" id="chatWindow">
        <div class="chat-empty" id="chatEmpty">
          <div class="chat-empty-icon">💬</div>
          <p>Ask a question by typing or speaking.<br />
          I'll answer from your uploaded PDF, or the default document if you haven't uploaded one.</p>
        </div>
      </section>

      <div class="recording-indicator" id="recordingIndicator">
        <span class="rec-dot"></span> Listening…
      </div>

      <form class="composer" id="composer">
        <input type="file" id="fileInput" accept="application/pdf" hidden />

        <button type="button" class="icon-btn" id="uploadButton" title="Upload a PDF" aria-label="Upload PDF">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12" /><path d="m7 8 5-5 5 5" /><path d="M5 21h14" />
          </svg>
        </button>

        <input type="text" id="textInput" class="text-input" placeholder="Ask anything" autocomplete="off" />

        <button type="button" class="icon-btn mic-btn" id="micButton" title="Speak your question" aria-label="Start listening">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
          </svg>
        </button>

        <button type="submit" class="send-btn" id="sendButton" aria-label="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" />
          </svg>
        </button>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
